version: '3.9'

services:
  postgres:
    image: postgres:16-alpine
    container_name: medico_postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: medico
      POSTGRES_USER: medico
      POSTGRES_PASSWORD: medico_dev_password
    ports:
      - '5432:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U medico']
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: medico_redis
    restart: unless-stopped
    ports:
      - '6379:6379'
    volumes:
      - redis_data:/data
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: .
      dockerfile: apps/backend/Dockerfile
    container_name: medico_backend
    restart: unless-stopped
    env_file:
      - apps/backend/.env
    environment:
      DATABASE_URL: postgresql://medico:medico_dev_password@postgres:5432/medico?schema=public
      REDIS_URL: redis://redis:6379
      NODE_ENV: production
    ports:
      - '3001:3001'
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - backend_uploads:/app/uploads

  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
    container_name: medico_web
    restart: unless-stopped
    environment:
      NEXT_PUBLIC_API_URL: http://backend:3001/api/v1
      NODE_ENV: production
    ports:
      - '3000:3000'
    depends_on:
      - backend

volumes:
  postgres_data:
  redis_data:
  backend_uploads:
